<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 内容发布</title>
    <style id="theme-vars">
/* ==========================================
   Publish System — Brand Design Tokens
   Mobile App UI Design System
   ========================================== */

:root {
  /* ---- Brand Primary Gradient ---- */
  --color-primary-start: #FF6B9D;
  --color-primary-end: #C44DFF;
  --gradient-primary: linear-gradient(135deg, var(--color-primary-start), var(--color-primary-end));

  /* ---- Text Colors ---- */
  --color-title: #1A1A1A;
  --color-body: #1A1A1A;
  --color-secondary: #666666;
  --color-hint: #999999;
  --color-white: #FFFFFF;

  /* ---- Background Colors ---- */
  --bg-page: #FFFFFF;
  --bg-surface: #F5F5F7;
  --bg-overlay: rgba(0, 0, 0, 0.6);

  /* ---- Border ---- */
  --border-color: #EEEEEE;
  --divider-color: #F0F0F0;

  /* ---- Sandbox Purple Accent ---- */
  --color-sandbox-primary: #C44DFF;
  --color-sandbox-bg: rgba(196, 77, 255, 0.1);
  --gradient-sandbox: linear-gradient(135deg, #D87EFF, #A855F7);

  /* ---- IP Card Accent ---- */
  --color-ip-bg: rgba(255, 107, 157, 0.1);

  /* ---- Shape ---- */
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-full: 9999px;

  /* ---- Typography ---- */
  --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;

  --font-size-title: 16px;
  --font-weight-title: 700;

  --font-size-body: 14px;
  --font-weight-body: 400;

  --font-size-caption: 12px;
  --font-weight-caption: 400;

  --font-size-large: 24px;

  /* ---- Spacing ---- */
  --spacing-page-x: 20px;
  --spacing-section: 16px;
  --spacing-item: 12px;
  --spacing-xs: 8px;

  /* ---- Button Heights ---- */
  --height-primary-btn: 56px;
  --height-secondary-btn: 48px;
  --height-nav-btn: 32px;
  --height-option-row: 48px;

  /* ---- Drag Handle ---- */
  --drag-bar-width: 36px;
  --drag-bar-height: 4px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-secondary: var(--color-secondary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background: var(--bg-page);">
    <main class="max-w-[375px] mx-auto relative min-h-screen" style="font-family: var(--font-family);">

        <!-- Fixed Top Navigation Bar -->
        <header class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-[375px] z-30 flex items-center justify-between px-5 h-14" style="background: var(--bg-page);">
            <button data-dom-id="nav-back-ip" class="text-sm whitespace-nowrap active:opacity-60 transition-opacity duration-150" style="color: var(--color-secondary); font-size: 14px;">取消</button>
            <div class="flex items-center gap-1.5">
                <h1 class="text-base font-bold whitespace-nowrap" style="color: var(--color-title); font-size: 16px;">IP 内容发布</h1>
                <!-- Crown / Copyright IP icon -->
                <svg class="w-4 h-4 shrink-0" viewBox="0 0 16 16" fill="none">
                    <path d="M8 1L2 4L3.5 11.5L8 14L12.5 11.5L14 4L8 1Z" fill="url(#crown-grad)"/>
                    <defs>
                        <linearGradient id="crown-grad" x1="2" y1="1" x2="14" y2="14" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FF6B9D"/>
                            <stop offset="1" stop-color="#C44DFF"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <button class="text-white text-sm font-semibold whitespace-nowrap rounded-[var(--radius-sm)] transition-transform duration-150 active:scale-95" style="background: var(--gradient-primary); padding: 8px 16px; height: 32px; font-size: 14px;">发布</button>
        </header>

        <!-- Scrollable Content Area -->
        <div class="pt-14 pb-8">

            <!-- IP Binding Card -->
            <section class="mx-5 mt-4 flex items-center rounded-[var(--radius-md)]" style="background: var(--color-ip-bg); padding: 16px; min-height: 72px;">
                <!-- IP Avatar Circle with Gradient Border -->
                <div class="relative shrink-0" style="width: 48px; height: 48px;">
                    <div class="absolute inset-0 rounded-full" style="background: var(--gradient-primary);"></div>
                    <div class="absolute inset-[2px] rounded-full flex items-center justify-center" style="background: var(--bg-page);">
                        <!-- Placeholder Silhouette -->
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" style="color: var(--color-hint);">
                            <circle cx="12" cy="8" r="4" fill="currentColor" opacity="0.4"/>
                            <path d="M4 20C4 16.686 7.582 14 12 14C16.418 14 20 16.686 20 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
                        </svg>
                    </div>
                </div>
                <!-- IP Name & Description -->
                <div class="flex-1 min-w-0 ml-3">
                    <p class="font-bold truncate" style="font-size: 14px; color: var(--color-title);">治愈系小怪兽</p>
                    <p class="truncate mt-0.5" style="font-size: 12px; color: var(--color-hint);">治愈系小怪兽 IP</p>
                </div>
                <!-- Change Button -->
                <button class="shrink-0 ml-3 text-sm whitespace-nowrap active:opacity-60 transition-opacity duration-150" style="font-size: 14px; color: var(--color-hint);">更换</button>
            </section>

            <!-- Text Input Area -->
            <section class="mx-5 mt-4">
                <div class="rounded-[var(--radius-sm)]" style="background: var(--bg-surface); padding: 12px; min-height: 100px;">
                    <p class="w-full" style="font-size: 14px; color: var(--color-hint); min-height: 76px;">分享你的 IP 故事、新作品或周边</p>
                    <div class="flex justify-end">
                        <span style="font-size: 12px; color: var(--color-hint);">0/500</span>
                    </div>
                </div>
            </section>

            <!-- Image/Video Picker 9-Grid -->
            <section class="mx-5 mt-4">
                <div class="grid grid-cols-3 gap-1.5">
                    <!-- Sample Placeholder Cell -->
                    <div class="aspect-square rounded-[var(--radius-sm)] relative overflow-hidden" style="background: var(--bg-surface);">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <svg class="w-8 h-8" viewBox="0 0 32 32" fill="none" style="color: var(--color-hint); opacity: 0.3;">
                                <rect x="4" y="6" width="24" height="20" rx="3" stroke="currentColor" stroke-width="1.5"/>
                                <circle cx="11" cy="14" r="3" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M4 22L11 16L16 20L21 15L28 22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    </div>
                    <!-- Add Cell -->
                    <div class="aspect-square rounded-[var(--radius-sm)] flex items-center justify-center cursor-pointer" style="background: var(--bg-surface); border: 1.5px dashed var(--border-color);">
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" style="color: var(--color-hint);">
                            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
            </section>

            <!-- IP Exclusive Feature Section -->
            <section class="mx-5 mt-6">
                <h2 class="font-bold mb-3" style="font-size: 15px; color: var(--color-title);">IP 专属</h2>

                <!-- IP Tags -->
                <div class="mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm font-semibold" style="color: var(--color-title); font-size: 14px;">IP 标签</span>
                        <button class="text-xs active:opacity-60 transition-opacity duration-150" style="font-size: 12px; color: var(--color-hint);">编辑</button>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <span class="inline-flex items-center whitespace-nowrap rounded-[var(--radius-sm)]" style="background: rgba(255, 107, 157, 0.12); color: #FF6B9D; padding: 4px 10px; font-size: 12px;">#小怪兽日常</span>
                        <span class="inline-flex items-center whitespace-nowrap rounded-[var(--radius-sm)]" style="background: rgba(196, 77, 255, 0.12); color: #C44DFF; padding: 4px 10px; font-size: 12px;">#原创 IP</span>
                        <span class="inline-flex items-center whitespace-nowrap rounded-[var(--radius-sm)]" style="background: rgba(255, 107, 157, 0.12); color: #FF6B9D; padding: 4px 10px; font-size: 12px;">#治愈系</span>
                    </div>
                </div>

                <!-- Copyright Toggle Row -->
                <div class="flex items-center justify-between rounded-[var(--radius-sm)]" style="background: var(--bg-surface); padding: 14px 16px;">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold truncate" style="font-size: 14px; color: var(--color-title);">版权声明</p>
                        <p class="truncate mt-0.5" style="font-size: 12px; color: var(--color-hint);">发布后带版权保护标识</p>
                    </div>
                    <!-- Toggle ON (gradient) -->
                    <div class="shrink-0 ml-3 relative cursor-pointer" style="width: 44px; height: 24px;">
                        <div class="absolute inset-0 rounded-full" style="background: var(--gradient-primary);"></div>
                        <div class="absolute top-[2px] right-[2px] rounded-full bg-white" style="width: 20px; height: 20px;"></div>
                    </div>
                </div>

                <!-- IP Series Classification Row -->
                <div class="flex items-center justify-between rounded-[var(--radius-sm)] mt-2 cursor-pointer active:opacity-80 transition-opacity duration-150" style="background: var(--bg-surface); padding: 14px 16px; min-height: var(--height-option-row);">
                    <span class="text-sm font-semibold" style="font-size: 14px; color: var(--color-title);">选择 IP 系列</span>
                    <div class="flex items-center gap-1 shrink-0">
                        <span class="text-sm" style="font-size: 14px; color: var(--color-secondary);">日常篇</span>
                        <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" style="color: var(--color-hint);">
                            <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>

                <!-- Authorization Row -->
                <div class="flex items-center justify-between rounded-[var(--radius-sm)] mt-2 cursor-pointer active:opacity-80 transition-opacity duration-150" style="background: var(--bg-surface); padding: 14px 16px; min-height: var(--height-option-row);">
                    <span class="text-sm font-semibold" style="font-size: 14px; color: var(--color-title);">授权方式</span>
                    <div class="flex items-center gap-1 shrink-0">
                        <span class="text-sm" style="font-size: 14px; color: var(--color-secondary);">禁止转载</span>
                        <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" style="color: var(--color-hint);">
                            <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
            </section>

            <!-- Safe Area Bottom Padding -->
            <div class="h-[env(safe-area-inset-bottom,34px)]"></div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
