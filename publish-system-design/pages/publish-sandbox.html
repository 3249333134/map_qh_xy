<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沙盒创作</title>
    <style id="theme-vars">
/* ==========================================
   Publish System — Brand Design Tokens
   Mobile App UI Design System
   ========================================== */

:root {
  /* ---- Brand Primary Gradient ---- */
  --color-primary-start: #FF6B9D;
  --color-primary-end: #C44DFF;
  --gradient-primary: linear-gradient(135deg, var(--color-primary-start), var(--color-primary-end));

  /* ---- Text Colors ---- */
  --color-title: #1A1A1A;
  --color-body: #1A1A1A;
  --color-secondary: #666666;
  --color-hint: #999999;
  --color-white: #FFFFFF;

  /* ---- Background Colors ---- */
  --bg-page: #FFFFFF;
  --bg-surface: #F5F5F7;
  --bg-overlay: rgba(0, 0, 0, 0.6);

  /* ---- Border ---- */
  --border-color: #EEEEEE;
  --divider-color: #F0F0F0;

  /* ---- Sandbox Purple Accent ---- */
  --color-sandbox-primary: #C44DFF;
  --color-sandbox-bg: rgba(196, 77, 255, 0.1);
  --gradient-sandbox: linear-gradient(135deg, #D87EFF, #A855F7);

  /* ---- IP Card Accent ---- */
  --color-ip-bg: rgba(255, 107, 157, 0.1);

  /* ---- Shape ---- */
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-full: 9999px;

  /* ---- Typography ---- */
  --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;

  --font-size-title: 16px;
  --font-weight-title: 700;

  --font-size-body: 14px;
  --font-weight-body: 400;

  --font-size-caption: 12px;
  --font-weight-caption: 400;

  --font-size-large: 24px;

  /* ---- Spacing ---- */
  --spacing-page-x: 20px;
  --spacing-section: 16px;
  --spacing-item: 12px;
  --spacing-xs: 8px;

  /* ---- Button Heights ---- */
  --height-primary-btn: 56px;
  --height-secondary-btn: 48px;
  --height-nav-btn: 32px;
  --height-option-row: 48px;

  /* ---- Drag Handle ---- */
  --drag-bar-width: 36px;
  --drag-bar-height: 4px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-secondary: var(--color-secondary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen" style="background-color: var(--bg-page);">

      <!-- ===== Top Navigation Bar (fixed) ===== -->
      <header class="fixed top-0 left-0 right-0 z-30 flex items-center justify-between px-5 h-12" style="background-color: var(--bg-page); border-bottom: 1px solid var(--border-color);">
        <button data-dom-id="nav-back-sandbox" class="text-sm font-normal whitespace-nowrap" style="color: var(--color-secondary);">取消</button>
        <div class="flex items-center gap-1.5">
          <span class="text-base font-bold" style="color: var(--color-title);">沙盒创作</span>
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-sandbox-primary);">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.29 7 12 12 20.71 7"/>
            <line x1="12" y1="22" x2="12" y2="12"/>
          </svg>
        </div>
        <button class="inline-flex items-center justify-center text-sm font-medium text-white whitespace-nowrap" style="height: var(--height-nav-btn); padding: 0 16px; border-radius: var(--radius-full); background-color: var(--color-sandbox-primary);">保存</button>
      </header>

      <!-- ===== Scrollable Content Area ===== -->
      <div class="pt-12 pb-36">

        <!-- ===== Text Input Area ===== -->
        <div class="px-5 pt-4 pb-3">
          <div class="relative">
            <textarea class="w-full resize-none bg-transparent text-sm leading-relaxed outline-none" rows="5" placeholder="记录你的灵感草稿，仅自己可见" style="color: var(--color-body); font-family: var(--font-family);"></textarea>
            <span class="absolute bottom-0 right-0 text-xs" style="color: var(--color-hint);">0/500</span>
          </div>
        </div>

        <!-- ===== Image/Video Picker (9-grid) ===== -->
        <div class="px-5 pb-4">
          <div class="grid grid-cols-3 gap-2">
            <!-- Sample placeholder cell 1 -->
            <div class="aspect-square rounded-lg flex items-center justify-center" style="background-color: var(--bg-surface);">
              <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-hint);">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </div>
            <!-- Sample placeholder cell 2 -->
            <div class="aspect-square rounded-lg flex items-center justify-center" style="background-color: var(--bg-surface);">
              <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-hint);">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </div>
            <!-- Add cell -->
            <button class="aspect-square rounded-lg flex items-center justify-center" style="border: 1px dashed var(--border-color); background-color: transparent;">
              <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-hint);">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- ===== Sandbox Exclusive Feature Section ===== -->
        <div class="px-5 pt-3 pb-2">
          <div class="rounded-xl overflow-hidden" style="background-color: var(--color-sandbox-bg);">

            <!-- Section header -->
            <div class="flex items-center gap-2 px-4 pt-4 pb-2">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-sandbox-primary);">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
              </svg>
              <span class="text-sm font-bold" style="color: var(--color-sandbox-primary);">沙盒功能</span>
            </div>

            <!-- Divider -->
            <div class="mx-4" style="height: 1px; background-color: rgba(196, 77, 255, 0.15);"></div>

            <!-- 沙盒分类 - Category Tags -->
            <div class="px-4 py-3">
              <span class="text-xs font-medium block mb-2" style="color: var(--color-secondary);">沙盒分类</span>
              <div class="flex items-center gap-2 flex-wrap">
                <button class="inline-flex items-center justify-center text-xs font-medium text-white whitespace-nowrap" style="padding: 4px 12px; border-radius: var(--radius-full); background-color: var(--color-sandbox-primary);">灵感</button>
                <button class="inline-flex items-center justify-center text-xs font-medium whitespace-nowrap" style="padding: 4px 12px; border-radius: var(--radius-full); background-color: var(--bg-surface); color: var(--color-secondary);">待完善</button>
                <button class="inline-flex items-center justify-center text-xs font-medium whitespace-nowrap" style="padding: 4px 12px; border-radius: var(--radius-full); background-color: var(--bg-surface); color: var(--color-secondary);">测试</button>
                <button class="inline-flex items-center justify-center text-xs font-medium whitespace-nowrap" style="padding: 4px 12px; border-radius: var(--radius-full); border: 1px dashed rgba(196, 77, 255, 0.4); background-color: transparent; color: var(--color-sandbox-primary);">
                  <svg class="w-3 h-3 mr-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  自定义
                </button>
              </div>
            </div>

            <!-- Divider -->
            <div class="mx-4" style="height: 1px; background-color: rgba(196, 77, 255, 0.15);"></div>

            <!-- 定时发布 - Scheduled Toggle -->
            <div class="flex items-center justify-between px-4 py-3">
              <div class="flex items-center gap-3 min-w-0">
                <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-sandbox-primary);">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span class="text-sm font-medium" style="color: var(--color-body);">定时发布</span>
              </div>
              <!-- iOS-style toggle ON -->
              <div class="shrink-0 relative w-11 h-6 rounded-full cursor-pointer" style="background-color: var(--color-sandbox-primary);">
                <div class="absolute top-0.5 right-0.5 w-5 h-5 bg-white rounded-full" style="transition: transform 0.24s cubic-bezier(.3,0,0,1);"></div>
              </div>
            </div>

            <!-- DateTime picker placeholder (shown when toggle is ON) -->
            <div class="mx-4 mb-3 rounded-lg flex items-center justify-between px-3 py-2.5" style="background-color: var(--bg-page);">
              <span class="text-xs" style="color: var(--color-hint);">选择发布时间</span>
              <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-hint);">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </div>

            <!-- Divider -->
            <div class="mx-4" style="height: 1px; background-color: rgba(196, 77, 255, 0.15);"></div>

            <!-- 预览效果 - Preview Effect -->
            <button class="flex items-center justify-between w-full px-4 py-3" style="background-color: transparent;">
              <div class="flex items-center gap-3 min-w-0">
                <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-sandbox-primary);">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <span class="text-sm font-medium" style="color: var(--color-body);">预览发布效果</span>
              </div>
              <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-hint);">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </button>

            <!-- Divider -->
            <div class="mx-4" style="height: 1px; background-color: rgba(196, 77, 255, 0.15);"></div>

            <!-- 测试分享 - Test Share -->
            <button class="flex items-center justify-between w-full px-4 py-3" style="background-color: transparent;">
              <div class="flex flex-col min-w-0">
                <div class="flex items-center gap-3">
                  <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-sandbox-primary);">
                    <circle cx="18" cy="5" r="3"/>
                    <circle cx="6" cy="12" r="3"/>
                    <circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                  </svg>
                  <span class="text-sm font-medium" style="color: var(--color-body);">分享给指定好友测试</span>
                </div>
                <span class="text-xs mt-1 pl-7" style="color: var(--color-hint);">仅受邀好友可见，不影响公开记录</span>
              </div>
              <svg class="w-4 h-4 shrink-0 mt-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-hint);">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </button>

            <!-- Bottom padding inside section -->
            <div class="h-1"></div>
          </div>
        </div>
      </div>

      <!-- ===== Bottom Action Bar (fixed) ===== -->
      <div class="fixed bottom-0 left-0 right-0 z-30 flex items-center justify-between px-5 pb-[env(safe-area-inset-bottom,20px)] pt-3" style="background-color: var(--bg-page); border-top: 1px solid var(--border-color);">
        <button class="inline-flex items-center justify-center text-sm font-normal whitespace-nowrap" style="color: var(--color-secondary); padding: 8px 0;">存入草稿箱</button>
        <button class="inline-flex items-center justify-center text-sm font-medium text-white whitespace-nowrap" style="height: var(--height-secondary-btn); padding: 0 24px; border-radius: var(--radius-full); background: var(--gradient-primary);">发布到公开</button>
      </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
