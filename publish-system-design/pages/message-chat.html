<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天详情</title>
    <style id="theme-vars">
/* ==========================================
   Publish System — Brand Design Tokens
   Mobile App UI Design System
   ========================================== */

:root {
  /* ---- Brand Primary Gradient ---- */
  --color-primary-start: #FF6B9D;
  --color-primary-end: #C44DFF;
  --gradient-primary: linear-gradient(135deg, var(--color-primary-start), var(--color-primary-end));

  /* ---- Text Colors ---- */
  --color-title: #1A1A1A;
  --color-body: #1A1A1A;
  --color-secondary: #666666;
  --color-hint: #999999;
  --color-white: #FFFFFF;

  /* ---- Background Colors ---- */
  --bg-page: #FFFFFF;
  --bg-surface: #F5F5F7;
  --bg-overlay: rgba(0, 0, 0, 0.6);

  /* ---- Border ---- */
  --border-color: #EEEEEE;
  --divider-color: #F0F0F0;

  /* ---- Sandbox Purple Accent ---- */
  --color-sandbox-primary: #C44DFF;
  --color-sandbox-bg: rgba(196, 77, 255, 0.1);
  --gradient-sandbox: linear-gradient(135deg, #D87EFF, #A855F7);

  /* ---- IP Card Accent ---- */
  --color-ip-bg: rgba(255, 107, 157, 0.1);

  /* ---- Shape ---- */
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-full: 9999px;

  /* ---- Typography ---- */
  --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;

  --font-size-title: 16px;
  --font-weight-title: 700;

  --font-size-body: 14px;
  --font-weight-body: 400;

  --font-size-caption: 12px;
  --font-weight-caption: 400;

  --font-size-large: 24px;

  /* ---- Spacing ---- */
  --spacing-page-x: 20px;
  --spacing-section: 16px;
  --spacing-item: 12px;
  --spacing-xs: 8px;

  /* ---- Button Heights ---- */
  --height-primary-btn: 56px;
  --height-secondary-btn: 48px;
  --height-nav-btn: 32px;
  --height-option-row: 48px;

  /* ---- Drag Handle ---- */
  --drag-bar-width: 36px;
  --drag-bar-height: 4px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-secondary: var(--color-secondary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex flex-col h-screen" style="background: var(--bg-surface);">

      <!-- Fixed Top Navigation Bar -->
      <header class="sticky top-0 z-30 flex items-center justify-between px-4 shrink-0" style="height: 56px; background: var(--bg-page); border-bottom: 1px solid var(--border-color);">
        <!-- Left: Back button -->
        <a href="pages/message-center.html" data-dom-id="nav-back-chat" class="inline-flex items-center justify-center w-8 h-8 -ml-1" aria-label="返回">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-title);">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        <!-- Center: Contact name with online status -->
        <div class="flex flex-col items-center min-w-0">
          <span class="text-base font-semibold truncate" style="color: var(--color-title); font-size: var(--font-size-title); font-weight: var(--font-weight-title);">小王</span>
          <div class="flex items-center gap-1">
            <span class="inline-block w-1.5 h-1.5 rounded-full" style="background: #34C759;"></span>
            <span class="text-xs" style="color: var(--color-hint); font-size: 10px;">在线</span>
          </div>
        </div>
        <!-- Right: More options -->
        <button class="inline-flex items-center justify-center w-8 h-8 -mr-1" aria-label="更多">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-secondary);">
            <circle cx="12" cy="5" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="12" cy="19" r="1.5"></circle>
          </svg>
        </button>
      </header>

      <!-- Scrollable Chat Messages Area -->
      <div class="flex-1 overflow-y-auto no-scrollbar px-4 py-3 space-y-4" style="scroll-behavior: smooth;">

        <!-- Time stamp -->
        <div class="flex justify-center">
          <span class="px-3 py-1 text-xs rounded-lg" style="background: rgba(0,0,0,0.04); color: var(--color-hint); font-size: 11px;">今天 10:30</span>
        </div>

        <!-- Received message 1: 在吗？ -->
        <div class="flex items-start gap-2 max-w-[80%]">
          <!-- Avatar -->
          <div class="shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-xs font-medium" style="background: linear-gradient(135deg, #A8D8EA, #87CEEB); color: #1A5276;">王</div>
          <!-- Bubble -->
          <div class="relative px-3 py-2" style="background: var(--bg-page); border-radius: 4px var(--radius-sm) var(--radius-sm) var(--radius-sm); max-width: 70%;">
            <p class="text-sm leading-relaxed" style="color: var(--color-body); font-size: var(--font-size-body);">在吗？周末有空一起爬山吗</p>
            <!-- Time label below bubble -->
            <p class="text-right mt-0.5" style="font-size: 10px; color: var(--color-hint);">10:30</p>
          </div>
        </div>

        <!-- Sent message 1: 在的！ -->
        <div class="flex items-start gap-2 max-w-[80%] ml-auto flex-row-reverse">
          <div class="relative px-3 py-2" style="background: linear-gradient(135deg, #FF8C42, #FF6B3D); border-radius: var(--radius-sm) 4px var(--radius-sm) var(--radius-sm); max-width: 70%;">
            <p class="text-sm leading-relaxed text-white" style="font-size: var(--font-size-body);">在的！哪座山？</p>
            <p class="text-right mt-0.5" style="font-size: 10px; color: rgba(255,255,255,0.6);">10:31</p>
          </div>
        </div>

        <!-- Received message 2: 想去青城山 -->
        <div class="flex items-start gap-2 max-w-[80%]">
          <div class="shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-xs font-medium" style="background: linear-gradient(135deg, #A8D8EA, #87CEEB); color: #1A5276;">王</div>
          <div class="relative px-3 py-2" style="background: var(--bg-page); border-radius: 4px var(--radius-sm) var(--radius-sm) var(--radius-sm); max-width: 70%;">
            <p class="text-sm leading-relaxed" style="color: var(--color-body); font-size: var(--font-size-body);">想去青城山，上次听你说想去</p>
          </div>
        </div>

        <!-- Sent message 2: 对对对！ -->
        <div class="flex items-start gap-2 max-w-[80%] ml-auto flex-row-reverse">
          <div class="relative px-3 py-2" style="background: linear-gradient(135deg, #FF8C42, #FF6B3D); border-radius: var(--radius-sm) 4px var(--radius-sm) var(--radius-sm); max-width: 70%;">
            <p class="text-sm leading-relaxed text-white" style="font-size: var(--font-size-body);">对对对！我一直想去</p>
          </div>
        </div>

        <!-- Received message 3: 那就这周六 -->
        <div class="flex items-start gap-2 max-w-[80%]">
          <div class="shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-xs font-medium" style="background: linear-gradient(135deg, #A8D8EA, #87CEEB); color: #1A5276;">王</div>
          <div class="relative px-3 py-2" style="background: var(--bg-page); border-radius: 4px var(--radius-sm) var(--radius-sm) var(--radius-sm); max-width: 70%;">
            <p class="text-sm leading-relaxed" style="color: var(--color-body); font-size: var(--font-size-body);">那就这周六早上8点出发？</p>
          </div>
        </div>

        <!-- Sent message 3: 没问题 -->
        <div class="flex items-start gap-2 max-w-[80%] ml-auto flex-row-reverse">
          <div class="relative px-3 py-2" style="background: linear-gradient(135deg, #FF8C42, #FF6B3D); border-radius: var(--radius-sm) 4px var(--radius-sm) var(--radius-sm); max-width: 70%;">
            <p class="text-sm leading-relaxed text-white" style="font-size: var(--font-size-body);">没问题，到时候你开车还是我开车？</p>
          </div>
        </div>

        <!-- Received message 4: 我开车吧 -->
        <div class="flex items-start gap-2 max-w-[80%]">
          <div class="shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-xs font-medium" style="background: linear-gradient(135deg, #A8D8EA, #87CEEB); color: #1A5276;">王</div>
          <div class="relative px-3 py-2" style="background: var(--bg-page); border-radius: 4px var(--radius-sm) var(--radius-sm) var(--radius-sm); max-width: 70%;">
            <p class="text-sm leading-relaxed" style="color: var(--color-body); font-size: var(--font-size-body);">我开车吧，你家顺路</p>
          </div>
        </div>

        <!-- Sent message 4: 好的 -->
        <div class="flex items-start gap-2 max-w-[80%] ml-auto flex-row-reverse">
          <div class="relative px-3 py-2" style="background: linear-gradient(135deg, #FF8C42, #FF6B3D); border-radius: var(--radius-sm) 4px var(--radius-sm) var(--radius-sm); max-width: 70%;">
            <p class="text-sm leading-relaxed text-white" style="font-size: var(--font-size-body);">好的，明天见！</p>
            <p class="text-right mt-0.5" style="font-size: 10px; color: rgba(255,255,255,0.6);">11:02</p>
          </div>
        </div>

      </div>

      <!-- Fixed Bottom Input Bar -->
      <div class="shrink-0 px-3 pt-2 pb-2" style="background: var(--bg-page); border-top: 1px solid var(--border-color); padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));">
        <div class="flex items-center gap-2">
          <!-- Plus button -->
          <button class="shrink-0 inline-flex items-center justify-center w-8 h-8 rounded-full" style="border: 1px solid var(--border-color); background: var(--bg-page);" aria-label="添加附件">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-hint);">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <!-- Text input -->
          <input type="text" placeholder="输入消息..." class="flex-1 min-w-0 h-9 px-3 text-sm outline-none" style="background: var(--bg-surface); border-radius: var(--radius-sm); color: var(--color-title); font-size: var(--font-size-body);" aria-label="输入消息">
          <!-- Send button (active state shown) -->
          <button class="shrink-0 inline-flex items-center justify-center h-9 px-4 text-sm font-medium text-white whitespace-nowrap transition-transform duration-150 active:scale-95" style="background: linear-gradient(135deg, #FF8C42, #FF6B3D); border-radius: var(--radius-sm); font-size: var(--font-size-body);" aria-label="发送">
            发送
          </button>
        </div>
      </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
