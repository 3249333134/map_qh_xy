/* ==========================================
   Publish System — Brand Design Tokens
   Mobile App UI Design System
   ========================================== */

:root {
  /* ---- Brand Primary Gradient ---- */
  --color-primary-start: #FF6B9D;
  --color-primary-end: #C44DFF;
  --gradient-primary: linear-gradient(135deg, var(--color-primary-start), var(--color-primary-end));

  /* ---- Text Colors ---- */
  --color-title: #1A1A1A;
  --color-body: #1A1A1A;
  --color-secondary: #666666;
  --color-hint: #999999;
  --color-white: #FFFFFF;

  /* ---- Background Colors ---- */
  --bg-page: #FFFFFF;
  --bg-surface: #F5F5F7;
  --bg-overlay: rgba(0, 0, 0, 0.6);

  /* ---- Border ---- */
  --border-color: #EEEEEE;
  --divider-color: #F0F0F0;

  /* ---- Sandbox Purple Accent ---- */
  --color-sandbox-primary: #C44DFF;
  --color-sandbox-bg: rgba(196, 77, 255, 0.1);
  --gradient-sandbox: linear-gradient(135deg, #D87EFF, #A855F7);

  /* ---- IP Card Accent ---- */
  --color-ip-bg: rgba(255, 107, 157, 0.1);

  /* ---- Shape ---- */
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-full: 9999px;

  /* ---- Typography ---- */
  --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;

  --font-size-title: 16px;
  --font-weight-title: 700;

  --font-size-body: 14px;
  --font-weight-body: 400;

  --font-size-caption: 12px;
  --font-weight-caption: 400;

  --font-size-large: 24px;

  /* ---- Spacing ---- */
  --spacing-page-x: 20px;
  --spacing-section: 16px;
  --spacing-item: 12px;
  --spacing-xs: 8px;

  /* ---- Button Heights ---- */
  --height-primary-btn: 56px;
  --height-secondary-btn: 48px;
  --height-nav-btn: 32px;
  --height-option-row: 48px;

  /* ---- Drag Handle ---- */
  --drag-bar-width: 36px;
  --drag-bar-height: 4px;
}

              data-dom-id="btn-publish-sandbox"
              class="flex-1 flex flex-col items-center justify-center gap-1 active:scale-[0.98] transition-transform duration-150"
              style="height: 52px; border-radius: 14px; background: rgba(255, 255, 255, 0.95); cursor: pointer; border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.08);"
            >
              <div class="flex items-center gap-1.5" style="color: #1A1A1A; font-size: 14px; font-weight: 500;">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink: 0;">
                  <rect x="1.5" y="2.5" width="13" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                  <path d="M4.5 8H11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                沙盒
              </div>
              <span style="color: #999; font-size: 10px;">私密创作·仅自己可见</span>
            </button>

            <!-- IP button -->
            <button
              data-dom-id="btn-publish-ip"
              class="flex-1 flex flex-col items-center justify-center gap-1 active:scale-[0.98] transition-transform duration-150"
              style="height: 52px; border-radius: 14px; background: rgba(255, 255, 255, 0.95); cursor: pointer; border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.08);"
            >
              <div class="flex items-center gap-1.5" style="color: #1A1A1A; font-size: 14px; font-weight: 500;">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink: 0;">
                  <path d="M8 1.5L10.2 5.5L14.5 6.2L11.5 9.5L12.2 14L8 12L3.8 14L4.5 9.5L1.5 6.2L5.8 5.5L8 1.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
                </svg>
                原创 IP
              </div>
              <span style="color: #999; font-size: 10px;">绑定 IP·版权保护</span>
            </button>
          </div>

          <!-- Close button — pink-purple gradient circle -->
          <div class="flex justify-center mt-3">
            <button
              data-dom-id="btn-close-popup"
              class="flex items-center justify-center whitespace-nowrap active:scale-[0.92] transition-transform duration-150"
              style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #FF6B9D, #C44DFF); color: white; cursor: pointer; border: none; box-shadow: 0 2px 8px rgba(255,107,157,0.3);"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink: 0;">
                <path d="M18 6L6 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M6 6L18 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>

        </div>

      </div>

      <!-- Bottom tab bar — 4 tabs with center + button -->
      <div class="absolute bottom-0 left-0 right-0 z-30 flex items-center" style="height: 64px; background: rgba(255, 255, 255, 0.97); border-top: 0.5px solid rgba(0,0,0,0.08); padding-bottom: env(safe-area-inset-bottom, 0px);">
        <!-- 首页 (active) -->
        <div class="flex-1 flex flex-col items-center justify-center gap-0.5" style="cursor: pointer;">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 8L11 3L19 8V17C19 18 18 19 17 19H5C4 19 3 18 3 17V8Z" stroke="#FF6B9D" stroke-width="1.5" stroke-linejoin="round" fill="rgba(255,107,157,0.08)"/></svg>
          <span style="font-size: 10px; color: #FF6B9D; font-weight: 500;">首页</span>
        </div>
        <!-- 服务 -->
        <div class="flex-1 flex flex-col items-center justify-center gap-0.5" style="cursor: pointer;">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="3" width="7" height="7" rx="2" stroke="#999" stroke-width="1.5"/><rect x="12" y="3" width="7" height="7" rx="2" stroke="#999" stroke-width="1.5"/><rect x="3" y="12" width="7" height="7" rx="2" stroke="#999" stroke-width="1.5"/><rect x="12" y="12" width="7" height="7" rx="2" stroke="#999" stroke-width="1.5"/></svg>
          <span style="font-size: 10px; color: #999;">服务</span>
        </div>
        <!-- Center + publish button (raised) -->
        <div class="flex flex-col items-center justify-center" style="flex: 0 0 56px; margin-top: -18px;">
          <div class="flex items-center justify-center" style="width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #FF6B9D, #C44DFF); box-shadow: 0 2px 10px rgba(255,107,157,0.4);">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 5V17M5 11H17" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
          </div>
        </div>
        <!-- 消息 -->
        <div class="flex-1 flex flex-col items-center justify-center gap-0.5" style="cursor: pointer;">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 6C4 5 5 4 6 4H16C17 4 18 5 18 6V13C18 14 17 15 16 15H8L5 18V15H6" stroke="#999" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>
          <span style="font-size: 10px; color: #999;">消息</span>
        </div>
        <!-- 我的 -->
        <div class="flex-1 flex flex-col items-center justify-center gap-0.5" style="cursor: pointer;">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="8" r="4" stroke="#999" stroke-width="1.5"/><path d="M4 19C4 15.68 7.13 13 11 13C14.87 13 18 15.68 18 19" stroke="#999" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span style="font-size: 10px; color: #999;">我的</span>
        </div>
      </div>

    </main>
    <style>
      @keyframes locationPulse {
        0% { transform: scale(1); opacity: 0.6; }
        100% { transform: scale(2.2); opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        button { transition-duration: 0.01ms !important; }
        @keyframes locationPulse { 0%, 100% { transform: scale(1); opacity: 0.3; } }
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
